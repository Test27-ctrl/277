                          <div className="absolute top-0 right-0 w-12 h-12 md:w-20 md:h-20 border-t-[5px] border-r-[5px] border-[#D4AF37] rounded-tr-[2rem] md:rounded-tr-[3rem] opacity-70"></div>
                          <div className="absolute bottom-0 left-0 w-12 h-12 md:w-20 md:h-20 border-b-[5px] border-l-[5px] border-[#D4AF37] rounded-bl-[2rem] md:rounded-bl-[3rem] opacity-70"></div>
                          <div className="absolute bottom-0 right-0 w-12 h-12 md:w-20 md:h-20 border-b-[5px] border-r-[5px] border-[#D4AF37] rounded-br-[2rem] md:rounded-br-[3rem] opacity-70"></div>

                          <div className="text-center mb-8 md:mb-10 relative">
                            <div className="absolute -top-8 md:-top-16 left-1/2 transform -translate-x-1/2 bg-[#2A0A0A] dark:bg-black text-[#F3E5AB] px-8 md:px-10 py-2 md:py-3 rounded-full text-xs md:text-sm font-bold uppercase tracking-[0.3em] border-[3px] border-[#D4AF37] shadow-xl z-20 whitespace-nowrap">
                              Branch {index + 1}
                            </div>
                            
                            <div className="flex justify-center items-start gap-4 sm:gap-6 md:gap-20 pt-8 md:pt-10 relative z-10">
                              {branch.parents.map((parent, idx) => (
                                <Fragment key={parent.id}>
                                  <PortraitCard member={parent} />
                                  {idx === 0 && branch.parents.length > 1 && (
                                     <div className="flex items-center justify-center pt-16 md:pt-20 px-1 md:px-0">
                                        <Icon name="heart" className="text-[#D4AF37] animate-pulse" size={32} />
                                     </div>
                                  )}
                                </Fragment>
                              ))}
                            </div>
                          </div>

                          <div className="w-full flex flex-col items-center mb-8 md:mb-12">
                            <div className="w-1 h-8 md:h-12 bg-gradient-to-b from-[#D4AF37] to-transparent rounded-full"></div>
                            <div className="p-1.5 md:p-2 border-2 border-[#D4AF37]/50 rounded-full my-1 bg-[#FFF9F0] dark:bg-black shadow-sm">
                                <Icon name="heart" className="text-[#8B0000] dark:text-[#D4AF37]" size={16} />
                            </div>
                            <div className="w-1 h-8 md:h-12 bg-gradient-to-b from-transparent to-[#D4AF37] rounded-full"></div>
                          </div>

                          <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-12">
                            {branch.children.map((childNode) => (
                              <div key={childNode.id} className="bg-white dark:bg-black/40 rounded-[2rem] md:rounded-[2.5rem] p-4 sm:p-6 md:p-8 border-[2px] border-[#D4AF37]/30 shadow-xl flex flex-col items-center hover:-translate-y-1 transition-transform relative">
                                
                                <div className="flex justify-center items-start gap-2 sm:gap-4 md:gap-10 relative w-full z-10">
                                  {childNode.parents.map((p, idx) => (
                                     <Fragment key={p.id}>
                                       <PortraitCard member={p} isSmall />
                                       {idx === 0 && childNode.parents.length > 1 && (
                                         <div className="flex items-center justify-center pt-10 md:pt-14 px-1 md:px-0">
                                            <Icon name="heart" className="text-[#D4AF37]/60 animate-pulse" size={20} />
                                         </div>
                                       )}
                                     </Fragment>
                                  ))}
                                </div>
                                
                                {childNode.children && childNode.children.length > 0 && (
                                  <div className="w-full mt-2 md:mt-4 flex flex-col items-center">
                                    <div className="flex flex-col items-center my-3 md:my-4">
                                        <div className="w-0.5 h-4 md:h-6 bg-gradient-to-b from-[#D4AF37]/60 to-[#8B0000]/40 dark:to-[#D4AF37]/40"></div>
                                        <div className="px-4 py-1 rounded-full bg-[#FFF9F0] dark:bg-[#1A0505] border border-[#D4AF37]/30 text-[0.55rem] md:text-[0.6rem] font-bold tracking-[0.2em] text-[#8B0000] dark:text-[#D4AF37] uppercase my-1 shadow-sm">
                                          Their Children
                                        </div>
                                        <div className="w-0.5 h-4 md:h-6 bg-gradient-to-b from-[#8B0000]/40 dark:from-[#D4AF37]/40 to-[#D4AF37]/60"></div>
                                    </div>
                                    <div className="flex justify-center items-start gap-3 sm:gap-4 md:gap-6 flex-wrap bg-[#FFF9F0]/60 dark:bg-black/30 w-full p-4 md:p-6 rounded-[1.5rem] md:rounded-[2rem] border border-[#D4AF37]/10 shadow-inner">
                                      {childNode.children.map(grandchildNode => (
                                        grandchildNode.parents.map(gk => <PortraitCard key={gk.id} member={gk} isSmall />)
                                      ))}
                                    </div>
                                  </div>
                                )}
                              </div>
                            ))}
                          </div>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </main>

              <section id="map" className="max-w-6xl mx-auto py-16 px-6 relative z-20">
                <div className="bg-gradient-to-br from-[#FFF9F0] to-[#FDF5E6] dark:from-[#1A0505] dark:to-black rounded-[3rem] border-[3px] border-[#D4AF37]/40 shadow-2xl p-10 text-center">
                  <h2 className="font-serif text-4xl font-bold dark:text-[#F3E5AB] mb-10">Where Are We?</h2>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                    {Object.keys(uniqueLocations).map((loc) => (
                      <div key={loc} onClick={() => setSelectedLocation(loc)} className="bg-white/70 dark:bg-[#2A0A0A] p-6 rounded-3xl border-2 border-[#D4AF37]/30 cursor-pointer hover:scale-105 transition-all">
                        <Icon name="map-pin" className="text-[#8B0000] dark:text-[#D4AF37] mx-auto mb-2" size={24} />
                        <h3 className="font-serif font-bold dark:text-white">{loc}</h3>
                        <p className="text-xs text-[#8B0000] dark:text-[#D4AF37] font-bold uppercase">{uniqueLocations[loc].length} Members</p>
                      </div>
                    ))}
                  </div>
                </div>
              </section>

              <section id="polls" className="max-w-4xl mx-auto py-16 px-6 relative z-20">
                <div className="bg-[#FFF9F0] dark:bg-[#1A0505] p-10 rounded-[3rem] border-[3px] border-[#D4AF37] shadow-xl text-center">
                    <Icon name="vote" className="text-[#8B0000] dark:text-[#D4AF37] mx-auto mb-4" size={32} />
                    <h2 className="font-serif text-3xl font-bold dark:text-white mb-8">Parivaar Live Poll</h2>
                    {activePoll && (
                        <div className="space-y-4 max-w-sm mx-auto">
                            <p className="font-bold dark:text-white mb-4">{activePoll.question}</p>
                            {activePoll.options.map((opt, idx) => {
                                const total = activePoll.options.reduce((a, c) => a + c.votes, 0);
                                const percent = total > 0 ? Math.round((opt.votes/total)*100) : 0;
                                const isVoted = hasVoted === activePoll.id;
                                return (
                                    <div key={idx} className="relative">
                                        <button disabled={isVoted} onClick={() => handleVote(idx)} className="w-full p-4 rounded-xl border-2 border-[#D4AF37]/40 relative z-10 font-bold dark:text-white flex justify-between">
                                            <span>{opt.text}</span>{isVoted && <span>{percent}%</span>}
                                        </button>
                                        {isVoted && <div className="absolute inset-y-0 left-0 bg-[#D4AF37]/20 rounded-xl transition-all duration-1000" style={{width: `${percent}%`}}></div>}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
              </section>

              <section id="chitchat" className="max-w-6xl mx-auto py-16 px-6 relative z-20">
                <div className="bg-gradient-to-br from-[#FFF9F0] to-[#FDF5E6] dark:from-[#1A0505] dark:to-black rounded-[3rem] border-[3px] border-[#D4AF37]/40 p-10">
                    <h2 className="font-serif text-3xl md:text-5xl text-center dark:text-white mb-10">Chitthi-Patri</h2>
                    <div className="flex flex-col md:flex-row gap-10">
                        <div className="md:w-1/3 space-y-4"><input type="text" placeholder="Your Name" value={newMessage.name} onChange={e => setNewMessage({...newMessage, name: e.target.value})} className="w-full p-4 rounded-xl bg-white dark:bg-black border border-[#D4AF37]/50 dark:text-white" /><textarea placeholder="Your Message" value={newMessage.text} onChange={e => setNewMessage({...newMessage, text: e.target.value})} className="w-full p-4 rounded-xl h-32 border border-[#D4AF37]/50 dark:text-white bg-white dark:bg-black"></textarea><button onClick={handleSendMessage} className="w-full bg-[#5C1616] text-[#F3E5AB] py-4 rounded-xl font-bold uppercase shadow-lg">Post Message</button></div>
                        <div className="flex-1 h-[400px] overflow-y-auto space-y-4 pr-2 custom-scrollbar">
                            {messages.length === 0 && <div className="text-center opacity-50 mt-10 italic dark:text-white">Be the first to write a message!</div>}
                            {messages.map(m => (
                            <div key={m.id} className="bg-white dark:bg-black/50 p-6 rounded-2xl border-l-4 border-[#D4AF37] shadow-sm"><div className="flex justify-between mb-2"><span className="font-bold text-[#8B0000] dark:text-[#D4AF37]">{m.name}</span><span className="text-[10px] uppercase font-bold opacity-50 dark:text-white">{m.date}</span></div><p className="text-sm dark:text-white mb-4">{m.text}</p><button onClick={() => handleReaction(m.id)} className="flex items-center gap-1.5 text-[#8B0000] dark:text-[#D4AF37] text-xs font-bold"><Icon name="heart" size={14} className={m.reactions > 0 ? "fill-current" : ""}/> {m.reactions || 0}</button></div>
                        ))}</div>
                    </div>
                </div>
              </section>

              <footer className="bg-[#1A0505] text-[#F3E5AB] py-20 text-center border-t-[8px] border-double border-[#D4AF37]">
                <Icon name="flower-2" className="text-[#D4AF37] mx-auto mb-6 animate-spin-slow" size={48} /><p className="font-serif text-4xl md:text-5xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-[#D4AF37] via-[#FFF2CD] to-[#AA771C]">Jorwal Parivaar</p>
                <p className="text-sm tracking-[0.5em] uppercase text-[#D4AF37]/90 mt-4">॥ वसुधैव कुटुम्बकम् ॥</p>
              </footer>

              {selectedMember && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                  <div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={() => setSelectedMember(null)}></div>
                  <div className="relative w-full max-w-5xl bg-[#FFF9F0] dark:bg-[#1A0505] border-[6px] border-[#D4AF37] rounded-3xl overflow-hidden flex flex-col md:flex-row max-h-[90vh]">
                    <div className="absolute inset-1 md:inset-2 border-[3px] md:border-[4px] border-double border-[#D4AF37]/60 rounded-[1.5rem] md:rounded-2xl pointer-events-none z-20"></div>
                    <button onClick={() => setSelectedMember(null)} className="absolute top-6 right-6 z-[210] text-[#D4AF37] p-2 bg-black rounded-full border border-[#D4AF37] hover:rotate-90 transition-all"><Icon name="x" size={24} /></button>
                    <div className="w-full md:w-2/5 bg-[#5C1616] dark:bg-black p-8 flex items-center justify-center relative overflow-hidden">
                       <Icon name="flower-2" className="absolute text-white/5 dark:text-[#D4AF37]/5 w-[150%] h-[150%] animate-[spin_30s_linear_infinite]" size={400} />
                       <div className="relative w-[60%] sm:w-1/2 md:w-full aspect-[3/4] max-w-[280px] z-10">
                          <div className="absolute inset-0 bg-gradient-to-br from-[#D4AF37] to-[#F3E5AB] dark:to-[#8B0000] rounded-t-full rounded-b-md shadow-2xl"></div>
                          <div className="absolute inset-[3px] md:inset-[4px] bg-[#2A0A0A] rounded-t-full rounded-b-md overflow-hidden">
                            {selectedMember.image ? <img src={selectedMember.image} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center text-[#F3E5AB] font-bold">Photo Bhejdo</div>}
                          </div>
                       </div>
                    </div>
                    <div className="w-full md:w-3/5 p-8 md:p-14 overflow-y-auto custom-scrollbar relative bg-[#FFF9F0] dark:bg-[#1A0505] modal-main-container">
                        <span className="text-[#8B0000] dark:text-[#D4AF37] font-bold tracking-[0.3em] uppercase text-[10px] mb-5 border-b-2 border-[#D4AF37] inline-block">{selectedMember.role}</span>
                        <h2 className="font-serif text-4xl md:text-6xl font-bold dark:text-[#F3E5AB] mb-6">{selectedMember.name}</h2>
                        <p className="text-base md:text-xl text-[#5C1616] dark:text-[#F3E5AB]/80 leading-relaxed font-medium mb-10">{selectedMember.bio || "A vital part of the Jorwal Parivaar legacy."}</p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 pt-10 border-t-2 border-dashed border-[#D4AF37]/30">
                            <div className="flex items-start space-x-4"><Icon name="briefcase" size={20} className="text-[#8B0000] dark:text-[#D4AF37] mt-1"/><div className="text-sm md:text-base font-bold dark:text-white uppercase tracking-wider">{selectedMember.profession}</div></div>
                            {selectedMember.location && <div className="flex items-start space-x-4"><Icon name="map-pin" size={20} className="text-[#8B0000] dark:text-[#D4AF37] mt-1"/><div className="text-sm md:text-base font-bold dark:text-white uppercase tracking-wider">{selectedMember.location}</div></div>}
                            {selectedMember.birthday && <div className="flex items-start space-x-4"><Icon name="cake" size={20} className="text-[#8B0000] dark:text-[#D4AF37] mt-1"/><div className="text-sm md:text-base font-bold dark:text-white uppercase tracking-wider">{selectedMember.birthday}</div></div>}
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {selectedLocation && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4"><div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={() => setSelectedLocation(null)}></div>
                  <div className="relative w-full max-w-4xl bg-[#FFF9F0] dark:bg-[#0a0202] border-[4px] border-[#D4AF37] rounded-[2rem] overflow-hidden flex flex-col max-h-[85vh]">
                    <button onClick={() => setSelectedLocation(null)} className="absolute top-6 right-6 z-[210] text-[#D4AF37] p-2 bg-black rounded-full border border-[#D4AF37]"><Icon name="x" size={20} /></button>
                    <div className="p-8 border-b-2 border-[#D4AF37]/30 text-center dark:bg-[#1A0505]"><h2 className="font-serif text-3xl font-bold dark:text-[#F3E5AB]">{selectedLocation}</h2></div>
                    <div className="p-10 overflow-y-auto custom-scrollbar flex flex-wrap justify-center gap-8 bg-white/50 dark:bg-black/50">{uniqueLocations[selectedLocation].map(m => <PortraitCard key={m.id} member={m} isSmall />)}</div>
                  </div>
                </div>
              )}
             </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
