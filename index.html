          return events
            .map(event => {
              const [dayStr, monthStr] = event.date.split(' ');
              const monthNamesArr = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
              const monthIndex = monthNamesArr.indexOf(monthStr);
              let eventDate = new Date(now.getFullYear(), monthIndex, parseInt(dayStr));
              if (eventDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                eventDate.setFullYear(now.getFullYear() + 1);
              }
              return { ...event, absoluteDate: eventDate };
            })
            .filter(event => {
              const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
              return event.absoluteDate >= today && event.absoluteDate <= ninetyDaysFromNow;
            })
            .sort((a, b) => a.absoluteDate - b.absoluteDate);

                  <div className="relative w-full max-w-5xl bg-[#FFF9F0] dark:bg-[#1A0505] border-[6px] border-[#D4AF37] rounded-3xl overflow-hidden flex flex-col md:flex-row max-h-[90vh]">
                    <button onClick={() => setSelectedMember(null)} className="absolute top-6 right-6 z-[210] text-[#D4AF37] p-2 bg-black rounded-full border border-[#D4AF37]"><Icon name="x" size={24} /></button>
                    <div className="w-full md:w-2/5 bg-[#5C1616] p-8 flex items-center justify-center relative overflow-hidden"><div className="relative w-full aspect-[3/4] max-w-[320px] z-10"><div className="absolute inset-0 bg-gradient-to-br from-[#D4AF37] to-[#F3E5AB] rounded-t-full rounded-b-md shadow-2xl"></div><div className="absolute inset-[4px] bg-[#2A0A0A] rounded-t-full rounded-b-md overflow-hidden">{selectedMember.image ? <img src={selectedMember.image} className="w-full h-full object-cover" /> : <div className="h-full flex items-center justify-center text-[#F3E5AB] font-bold">Photo Bhejdo</div>}</div></div></div>
                    <div className="w-full md:w-3/5 p-8 md:p-14 overflow-y-auto custom-scrollbar relative bg-[#FFF9F0] dark:bg-[#1A0505] modal-main-container">
                        <span className="text-[#8B0000] dark:text-[#D4AF37] font-bold tracking-widest uppercase text-xs border-b-2 border-[#D4AF37] inline-block mb-4">{selectedMember.role}</span>
                        <h2 className="font-serif text-4xl md:text-6xl font-bold dark:text-[#F3E5AB] mb-6">{selectedMember.name}</h2>
                        <p className="text-xl dark:text-[#F3E5AB]/80 leading-relaxed font-medium mb-10">{selectedMember.bio || "A vital part of the Jorwal Parivaar legacy."}</p>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-8 pt-10 border-t-2 border-dashed border-[#D4AF37]/30">
                            <div className="flex items-start space-x-4"><Icon name="briefcase" size={24} className="text-[#8B0000] dark:text-[#D4AF37]"/><div className="font-bold dark:text-white">{selectedMember.profession}</div></div>
                            <div className="flex items-start space-x-4"><Icon name="map-pin" size={24} className="text-[#8B0000] dark:text-[#D4AF37]"/><div className="font-bold dark:text-white">{selectedMember.location || "Rajasthan"}</div></div>
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {selectedLocation && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4"><div className="absolute inset-0 bg-black/90 backdrop-blur-sm" onClick={() => setSelectedLocation(null)}></div>
                  <div className="relative w-full max-w-4xl bg-[#FFF9F0] dark:bg-[#0a0202] border-[4px] border-[#D4AF37] rounded-[2rem] overflow-hidden flex flex-col max-h-[85vh]">
                    <button onClick={() => setSelectedLocation(null)} className="absolute top-6 right-6 z-[210] text-[#D4AF37] p-2 bg-black rounded-full border border-[#D4AF37]"><Icon name="x" size={20} /></button>
                    <div className="p-8 border-b-2 border-[#D4AF37]/30 text-center dark:bg-[#1A0505]"><h2 className="font-serif text-3xl font-bold dark:text-[#F3E5AB]">{selectedLocation}</h2></div>
                    <div className="p-10 overflow-y-auto custom-scrollbar flex flex-wrap justify-center gap-8 bg-white/50 dark:bg-black/50">{uniqueLocations[selectedLocation].map(m => <PortraitCard key={m.id} member={m} isSmall />)}</div>
                  </div>
                </div>
              )}
             </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
