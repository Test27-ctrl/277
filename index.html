        const getUpcomingFilteredEvents = (events) => {
          if (!events || events.length === 0) return [];
          const now = new Date();
          const ninetyDaysFromNow = new Date();
          ninetyDaysFromNow.setDate(now.getDate() + 90);
          return events
            .map(event => {
              const [dayStr, monthStr] = event.date.split(' ');
              const monthNamesArr = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
              const monthIndex = monthNamesArr.indexOf(monthStr);
              let eventDate = new Date(now.getFullYear(), monthIndex, parseInt(dayStr));
              if (eventDate < new Date(now.getFullYear(), now.getMonth(), now.getDate())) {
                eventDate.setFullYear(now.getFullYear() + 1);
              }
              return { ...event, absoluteDate: eventDate };
            })
            .filter(event => {
              const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
              return event.absoluteDate >= today && event.absoluteDate <= ninetyDaysFromNow;
            })
            .sort((a, b) => a.absoluteDate - b.absoluteDate);

                                            <span className="text-sm md:text-lg">{opt.text}</span>
                                            {isVoted && <span className="text-royal-crimson dark:text-royal-gold text-base md:text-xl">{percent}%</span>}
                                        </button>
                                        {isVoted && <div className="absolute inset-y-0 left-0 bg-gradient-to-r from-royal-gold/30 to-royal-gold/10 rounded-xl md:rounded-2xl transition-all duration-1000" style={{width: `${percent}%`}}></div>}
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
              </section>

              <section id="chitchat" className="max-w-6xl mx-auto py-12 md:py-16 px-4 md:px-6 relative z-20">
                <div className="bg-gradient-to-b from-royal-cream to-[#FDF5E6] dark:from-royal-dark dark:to-[#110303] rounded-[2rem] md:rounded-[3rem] border-[3px] md:border-[4px] border-royal-gold/50 shadow-xl md:shadow-2xl p-5 md:p-14 relative">
                    <h2 className="font-serif text-3xl md:text-6xl text-center font-bold text-royal-dark dark:text-royal-lightgold mb-2 md:mb-4">॥ चिट्ठी पत्री ॥</h2>
                    <p className="text-center text-[10px] md:text-xs uppercase tracking-[0.2em] md:tracking-[0.4em] font-bold text-royal-maroon/70 dark:text-royal-gold/70 mb-8 md:mb-12">Digital Message Board</p>
                    
                    <div className="flex flex-col lg:flex-row gap-8 md:gap-12">
                        {/* Message Input Box */}
                        <div className="lg:w-1/3 bg-white dark:bg-black p-5 md:p-8 rounded-[1.5rem] md:rounded-[2rem] border-[2px] md:border-[3px] border-royal-gold shadow-inner relative">
                            <div className="absolute top-0 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-royal-maroon dark:bg-royal-dark border-2 border-royal-gold rounded-full p-2">
                                <Icon name="mail" className="text-royal-lightgold dark:text-royal-gold w-5 h-5 md:w-6 md:h-6" />
                            </div>
                            <div className="space-y-4 md:space-y-6 mt-4">
                                <div>
                                    <label className="text-[9px] md:text-[10px] font-bold uppercase tracking-widest text-royal-maroon dark:text-royal-gold mb-1 md:mb-2 block">Aapka Naam (Name)</label>
                                    <input type="text" value={newMessage.name} onChange={e => setNewMessage({...newMessage, name: e.target.value})} className="w-full p-3 md:p-4 rounded-lg md:rounded-xl bg-royal-cream/50 dark:bg-royal-dark/50 border-2 border-royal-gold/40 outline-none focus:border-royal-gold dark:text-white font-bold text-sm md:text-base" />
                                </div>
                                <div>
                                    <label className="text-[9px] md:text-[10px] font-bold uppercase tracking-widest text-royal-maroon dark:text-royal-gold mb-1 md:mb-2 block">Sandesh (Message)</label>
                                    <textarea value={newMessage.text} onChange={e => setNewMessage({...newMessage, text: e.target.value})} className="w-full p-3 md:p-4 rounded-lg md:rounded-xl h-24 md:h-32 resize-none bg-royal-cream/50 dark:bg-royal-dark/50 border-2 border-royal-gold/40 outline-none focus:border-royal-gold dark:text-white font-medium text-sm md:text-base"></textarea>
                                </div>
                                {chatError && <p className="text-red-500 font-bold text-xs bg-red-100 dark:bg-red-900/30 p-2 md:p-3 rounded-lg">{chatError}</p>}
                                <button onClick={handleSendMessage} className="shimmer w-full bg-gradient-to-r from-royal-maroon to-royal-crimson dark:from-royal-gold dark:to-[#AA771C] text-royal-lightgold dark:text-royal-dark py-3 md:py-5 rounded-lg md:rounded-xl text-sm md:text-base font-bold tracking-[0.1em] md:tracking-[0.2em] uppercase shadow-lg md:hover:scale-105 transition-transform flex items-center justify-center gap-2 md:gap-3">
                                    <Icon name="send" size={18} className="md:w-5 md:h-5" /> Post Message
                                </button>
                            </div>
                        </div>

                        {/* Messages List */}
                        <div className="flex-1 h-[400px] md:h-[500px] overflow-y-auto space-y-4 md:space-y-6 pr-2 md:pr-4 custom-scrollbar">
                            {messages.length === 0 && <div className="text-center opacity-50 mt-10 md:mt-20 font-serif text-lg md:text-2xl italic dark:text-royal-gold">Be the first to write a message!</div>}
                            {messages.map((m, index) => (
                                <div key={m.id} className={`bg-white/95 dark:bg-royal-dark/90 p-4 md:p-8 rounded-[1.5rem] md:rounded-[2rem] border-2 border-royal-gold/40 shadow-sm md:shadow-md relative md:hover:shadow-xl transition-all ${index % 2 === 0 ? 'ml-0 md:mr-10' : 'mr-0 md:ml-10'}`}>
                                    <Icon name="quote" className="absolute top-4 right-4 md:top-6 md:right-6 text-royal-gold/10 w-8 h-8 md:w-12 md:h-12 rotate-180 pointer-events-none" />
                                    <div className="flex justify-between items-start mb-2 md:mb-4 relative z-10">
                                        <span className="font-serif font-bold text-lg md:text-2xl text-royal-crimson dark:text-royal-gold">{m.name}</span>
                                        <span className="text-[8px] md:text-[10px] uppercase font-bold text-royal-maroon/60 dark:text-royal-lightgold/60 border border-royal-gold/30 rounded-full px-2 py-0.5 md:px-3 md:py-1">{m.date}</span>
                                    </div>
                                    <p className="text-sm md:text-base dark:text-white mb-4 md:mb-6 relative z-10 leading-snug md:leading-relaxed">{m.text}</p>
                                    <div className="flex justify-end relative z-10">
                                        <button onClick={() => handleReaction(m.id)} className="flex items-center gap-1.5 md:gap-2 bg-royal-cream dark:bg-black px-3 py-1.5 md:px-4 md:py-2 rounded-full border border-royal-gold/50 text-royal-crimson dark:text-royal-gold md:hover:bg-royal-gold/20 transition-colors">
                                            <Icon name="heart" size={14} className={`md:w-[18px] md:h-[18px] ${m.reactions > 0 ? "fill-current" : ""}`}/> 
                                            <span className="font-bold text-xs md:text-base">{m.reactions || 0}</span>
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
              </section>

              <footer className="bg-gradient-to-b from-royal-dark to-black text-royal-lightgold py-16 md:py-24 text-center border-t-[6px] md:border-t-[8px] border-double border-royal-gold relative overflow-hidden">
                <div className="absolute inset-0 bg-[url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'none\' fill-rule=\'evenodd\'%3E%3Cg fill=\'%23D4AF37\' fill-opacity=\'0.05\'%3E%3Cpath d=\'M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z\'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E')]"></div>
                <div className="relative z-10 max-w-4xl mx-auto px-4 md:px-6">
                    <div className="flex justify-center items-center mb-6 md:mb-8">
                        <div className="w-10 md:w-16 h-px bg-gradient-to-r from-transparent to-royal-gold"></div>
                        <Icon name="flower-2" className="text-royal-gold mx-4 md:mx-6 md:animate-spin-slow" size={32} />
                        <div className="w-10 md:w-16 h-px bg-gradient-to-l from-transparent to-royal-gold"></div>
                    </div>
                    <p className="font-serif text-3xl md:text-6xl font-bold tracking-widest bg-clip-text text-transparent bg-gradient-to-r from-royal-gold via-white to-[#AA771C] drop-shadow-lg mb-3 md:mb-4">Jorwal Parivaar</p>
                    <p className="text-[10px] md:text-base tracking-[0.4em] md:tracking-[0.6em] uppercase text-royal-gold/90 font-bold mb-8 md:mb-12">॥ वसुधैव कुटुम्बकम् ॥</p>
                    <p className="text-[9px] md:text-xs text-royal-gold/40 border-t border-royal-gold/20 pt-6 md:pt-8 inline-block px-8 md:px-12">A Legacy Built on Love and Respect.</p>
                </div>
              </footer>

              {/* Enhanced Member Modal (Popup) */}
              {selectedMember && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-3 sm:p-8 animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/95 backdrop-blur-md" onClick={() => setSelectedMember(null)}></div>
                  <div className="relative w-full max-w-5xl bg-royal-cream dark:bg-royal-dark border-[4px] md:border-[8px] border-double border-royal-gold rounded-[1.5rem] md:rounded-[3rem] shadow-[0_0_80px_rgba(212,175,55,0.2)] overflow-hidden flex flex-col md:flex-row max-h-[95vh] md:max-h-[90vh] scale-in-center">
                    <button onClick={() => setSelectedMember(null)} className="absolute top-3 right-3 md:top-6 md:right-6 z-[210] text-royal-gold p-1.5 md:p-2 bg-royal-dark/80 rounded-full border-2 border-royal-gold md:hover:rotate-90 transition-all"><Icon name="x" className="w-5 h-5 md:w-6 md:h-6" /></button>
                    
                    <div className="w-full md:w-2/5 bg-gradient-to-br from-royal-maroon to-[#2A0A0A] p-6 md:p-12 flex items-center justify-center relative overflow-hidden flex-shrink-0 min-h-[250px] md:min-h-0">
                       <Icon name="flower-2" className="absolute text-royal-gold/5 w-[150%] h-[150%] md:animate-spin-slower pointer-events-none" size={400} />
                       
                       {/* Modal Jharokha Image */}
                       <div className="relative w-[50%] sm:w-[40%] md:w-[90%] aspect-[3/4] z-10 md:animate-float">
                          <div className="absolute inset-0 bg-gradient-to-br from-royal-gold to-royal-lightgold rounded-t-[3rem] md:rounded-t-[4rem] rounded-b-xl shadow-2xl"></div>
                          <div className="absolute inset-[3px] md:inset-[6px] bg-royal-dark rounded-t-[2.8rem] md:rounded-t-[3.8rem] rounded-b-lg overflow-hidden border-[2px] md:border-[3px] border-double border-royal-maroon/50">
                            {selectedMember.image ? <img src={selectedMember.image} className="w-full h-full object-cover sepia-[0.1]" /> : <div className="h-full flex items-center justify-center text-royal-lightgold font-bold px-2 text-center text-xs md:text-base">Photo Bhejdo</div>}
                          </div>
                       </div>
                    </div>

                    <div className="w-full md:w-3/5 p-6 md:p-16 overflow-y-auto custom-scrollbar relative bg-royal-cream dark:bg-royal-dark modal-main-container">
                        <div className="absolute top-0 right-0 w-20 h-20 md:w-32 md:h-32 bg-royal-gold/5 rounded-bl-[100%] pointer-events-none"></div>
                        
                        <span className="text-royal-crimson dark:text-royal-gold font-bold tracking-[0.3em] md:tracking-[0.4em] uppercase text-[10px] md:text-xs border-b-2 border-royal-gold/50 inline-block mb-3 md:mb-6 pb-1">{selectedMember.role}</span>
                        <h2 className="font-serif text-3xl md:text-6xl font-bold text-royal-dark dark:text-white mb-4 md:mb-6 drop-shadow-sm">{selectedMember.name}</h2>
                        
                        <div className="relative pl-4 md:pl-6 border-l-[3px] md:border-l-4 border-royal-gold/40 mb-6 md:mb-10">
                            <Icon name="quote" className="absolute -top-1 -left-2 md:-top-2 md:-left-2 text-royal-gold/30 bg-royal-cream dark:bg-royal-dark w-4 h-4 md:w-5 md:h-5" />
                            <p className="text-sm md:text-xl text-royal-maroon/90 dark:text-royal-lightgold/80 leading-relaxed font-medium italic">{selectedMember.bio || "A vital thread in the fabric of the Jorwal Parivaar legacy."}</p>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-8 pt-6 md:pt-10 border-t-2 border-dashed border-royal-gold/30">
                            <div className="flex items-start space-x-3 md:space-x-4">
                                <div className="bg-royal-maroon/10 dark:bg-royal-gold/10 p-2 md:p-3 rounded-lg md:rounded-xl border border-royal-gold/30">
                                    <Icon name="briefcase" className="text-royal-crimson dark:text-royal-gold w-5 h-5 md:w-6 md:h-6"/>
                                </div>
                                <div>
                                    <p className="text-[9px] md:text-[10px] uppercase tracking-widest text-royal-maroon/60 dark:text-royal-gold/60 font-bold mb-0.5 md:mb-1">Profession</p>
                                    <div className="font-bold text-royal-dark dark:text-white text-sm md:text-base">{selectedMember.profession}</div>
                                </div>
                            </div>
                            {selectedMember.location && (
                            <div className="flex items-start space-x-3 md:space-x-4">
                                <div className="bg-royal-maroon/10 dark:bg-royal-gold/10 p-2 md:p-3 rounded-lg md:rounded-xl border border-royal-gold/30">
                                    <Icon name="map-pin" className="text-royal-crimson dark:text-royal-gold w-5 h-5 md:w-6 md:h-6"/>
                                </div>
                                <div>
                                    <p className="text-[9px] md:text-[10px] uppercase tracking-widest text-royal-maroon/60 dark:text-royal-gold/60 font-bold mb-0.5 md:mb-1">Location</p>
                                    <div className="font-bold text-royal-dark dark:text-white text-sm md:text-base">{selectedMember.location}</div>
                                </div>
                            </div>
                            )}
                            {selectedMember.birthday && (
                            <div className="flex items-start space-x-3 md:space-x-4">
                                <div className="bg-royal-maroon/10 dark:bg-royal-gold/10 p-2 md:p-3 rounded-lg md:rounded-xl border border-royal-gold/30">
                                    <Icon name="cake" className="text-royal-crimson dark:text-royal-gold w-5 h-5 md:w-6 md:h-6"/>
                                </div>
                                <div>
                                    <p className="text-[9px] md:text-[10px] uppercase tracking-widest text-royal-maroon/60 dark:text-royal-gold/60 font-bold mb-0.5 md:mb-1">Birthday</p>
                                    <div className="font-bold text-royal-dark dark:text-white text-sm md:text-base">{selectedMember.birthday}</div>
                                </div>
                            </div>
                            )}
                        </div>
                    </div>
                  </div>
                </div>
              )}

              {/* RESTORED: Royal Map Location Modal */}
              {selectedLocation && (
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 sm:p-8 animate-in fade-in duration-300">
                  <div className="absolute inset-0 bg-black/90 backdrop-blur-md" onClick={() => setSelectedLocation(null)}></div>
                  <div className="relative w-full max-w-4xl bg-royal-cream dark:bg-royal-dark border-[4px] md:border-[6px] border-double border-royal-gold rounded-[1.5rem] md:rounded-[3rem] overflow-hidden flex flex-col max-h-[85vh] shadow-[0_0_60px_rgba(212,175,55,0.2)] scale-in-center">
                    
                    <button onClick={() => setSelectedLocation(null)} className="absolute top-4 right-4 md:top-6 md:right-6 z-[210] text-royal-gold p-1.5 md:p-2 bg-royal-dark/80 rounded-full border-2 border-royal-gold md:hover:rotate-90 transition-all">
                        <Icon name="x" className="w-5 h-5 md:w-6 md:h-6" />
                    </button>
                    
                    <div className="p-6 md:p-10 border-b-[3px] border-double border-royal-gold/40 text-center bg-gradient-to-b from-royal-maroon to-royal-dark relative overflow-hidden">
                        <Icon name="flower-2" className="absolute text-royal-gold/5 w-[200%] h-[200%] md:animate-spin-slower pointer-events-none top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2" size={400} />
                        <Icon name="map-pin" className="text-royal-lightgold dark:text-royal-gold mx-auto mb-2 md:mb-3 relative z-10 w-8 h-8 md:w-10 md:h-10" />
                        <h2 className="font-serif text-3xl md:text-5xl font-bold text-royal-lightgold relative z-10 drop-shadow-md">{selectedLocation}</h2>
                    </div>
                    
                    <div className="p-8 md:p-12 overflow-y-auto custom-scrollbar flex flex-wrap justify-center gap-6 md:gap-10 bg-royal-cream/60 dark:bg-black/50">
                        {uniqueLocations[selectedLocation]?.map(m => <PortraitCard key={m.id} member={m} isSmall />)}
                    </div>
                    
                  </div>
                </div>
              )}

             </div>
            </div>
          );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
